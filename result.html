<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result - Badrul Huda Madrasa</title>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#348a8a;
--dark:#003d3d;
--white:#ffffff;
--green:#28a745;
--red:#dc3545;
}

body{
margin:0;
padding:20px;
background:var(--bg);
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:var(--white);
width:100%;
max-width:420px;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.header{
background:var(--dark);
color:white;
text-align:center;
padding:25px 10px;
}

.header h1{
font-family:'Saira',sans-serif;
margin:0;
font-size:1.3rem;
text-transform:uppercase;
}

.header p{
margin:5px 0 0;
font-size:0.85rem;
}

.result-body{
padding:20px;
}

.loading{
text-align:center;
padding:20px;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid var(--dark);
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin:10px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:15px;
font-size:0.9rem;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

th{
background:var(--dark);
color:white;
}

.info-table td:first-child{
font-weight:600;
width:35%;
}

.status{
text-align:center;
font-weight:700;
margin:10px 0;
font-size:1rem;
}

.pass{color:var(--green);}
.fail{color:var(--red);}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:var(--dark);
color:white;
font-weight:600;
cursor:pointer;
}

@media print{
body{background:white;}
button{display:none;}
.card{box-shadow:none;border:1px solid #eee;}
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h1>Badrul Huda Madrasa</h1>
<p>Annual Examination Result - 2026</p>
</div>

<div class="result-body">

<div id="loading" class="loading">
<div class="spinner"></div>
Fetching Result...
</div>

<div id="content" style="display:none;">

<table class="info-table">
<tr><td>Name</td><td id="name"></td></tr>
<tr><td>RegNo</td><td id="reg"></td></tr>
<tr><td>Class</td><td id="cls"></td></tr>
</table>

<table>
<tr>
<th>Subject Name</th>
<th>Mark</th>
</tr>
<tbody id="subjects"></tbody>
<tr><td><strong>Total</strong></td><td id="total"></td></tr>
<tr><td><strong>Average</strong></td><td id="average"></td></tr>
<tr><td><strong>Grade</strong></td><td id="grade"></td></tr>
</table>

<div id="status" class="status"></div>

<button onclick="window.print()">Print Result</button>

</div>

</div>
</div>

<script>

const subjectNames=["Fiqh","Aqeeda","Tazkiya","Nahw","Hifz"];

window.onload=function(){

const params=new URLSearchParams(window.location.search);
const reg=params.get("regNo");
const cls=params.get("class");

const url="https://script.google.com/macros/s/AKfycbyyIZQzWcRyCe6IQsf2O7mFFvT1s8XGkvywun_CajY9NOjayWID6fKUecm9REMALn5Unw/exec?regNo="+reg+"&class="+cls;

fetch(url)
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none";
document.getElementById("content").style.display="block";

if(data.error){
document.getElementById("content").innerHTML="Result Not Found";
return;
}

document.getElementById("name").innerText=data.name;
document.getElementById("reg").innerText=data.regNo;
document.getElementById("cls").innerText=data.class;

let total=0;
let rows="";

data.marks.forEach((mark,i)=>{
total+=Number(mark);
rows+=`<tr><td>${subjectNames[i]}</td><td>${mark}</td></tr>`;
});

document.getElementById("subjects").innerHTML=rows;

let avg=total/data.marks.length;
let grade=calculateGrade(avg);

document.getElementById("total").innerText=total;
document.getElementById("average").innerText=avg.toFixed(2)+"%";
document.getElementById("grade").innerText=grade;

let status=document.getElementById("status");

if(avg>=40){
status.innerText="Status : PASSED";
status.className="status pass";
}else{
status.innerText="Status : FAILED";
status.className="status fail";
}

})
.catch(()=>{
document.getElementById("loading").innerText="Server Error";
});
}

function calculateGrade(avg){
if(avg>=90)return"A+";
if(avg>=80)return"A";
if(avg>=70)return"B+";
if(avg>=60)return"B";
if(avg>=50)return"C";
if(avg>=40)return"D";
return"F";
}

</script>

</body>
</html>
